<div class="dynamic-form" [ngClass]="config?.cssClass || ''" *ngIf="form">
  <section class="form-panel">
    <header class="form-header" *ngIf="config?.title || config?.description">
      <div>
        <h5 class="form-title" *ngIf="config?.title">{{ config.title }}</h5>
        <p class="form-description" *ngIf="config?.description">{{ config.description }}</p>
      </div>
    </header>

    <form [formGroup]="form" (ngSubmit)="openPreview()">
      <div class="form-flex">
        <div class="field-shell" *ngFor="let field of fields" [ngStyle]="fieldStyle(field)">
          <app-field-renderer
            [field]="field"
            [form]="form"
            [readonly]="readonly"
            [errors]="errors"
            (fieldChanged)="onFieldChanged()"
            (fileSelected)="onFileSelected($event)"
          ></app-field-renderer>
        </div>
      </div>

      <footer class="form-actions">
        <button type="button" class="btn btn-outline-secondary" *ngIf="config?.showCancel" (click)="cancel()">
          {{ config.cancelLabel || '取消' }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="readonly || isSubmitting">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="isSubmitting"></span>
          預覽及提交
        </button>
      </footer>
    </form>
  </section>

  <div class="preview-backdrop" *ngIf="previewOpen">
    <section class="preview-dialog">
      <header class="preview-header">
        <h5>提交前預覽</h5>
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="closePreview()">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <div class="preview-body">
        <div class="preview-row" *ngFor="let row of getPreviewRows()">
          <div class="preview-label">{{ row.label }}</div>
          <pre class="preview-value">{{ row.value }}</pre>
        </div>
      </div>

      <footer class="preview-actions">
        <button type="button" class="btn btn-outline-secondary" (click)="closePreview()">返回修改</button>
        <button type="button" class="btn btn-primary" [disabled]="isSubmitting" (click)="submit()">
          <span class="spinner-border spinner-border-sm me-2" *ngIf="isSubmitting"></span>
          {{ config.submitLabel || '提交' }}
        </button>
      </footer>
    </section>
  </div>
</div>
