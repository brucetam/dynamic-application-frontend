<div class="field-control" [formGroup]="form">
  <label [for]="field.key" class="form-label">
    {{ field.label }} <span *ngIf="isRequired" class="text-danger">*</span>
  </label>
  <div class="input-group">
    <input
      [type]="visible ? 'text' : 'password'"
      class="form-control"
      [class.is-invalid]="errorMessage"
      [id]="field.key"
      [formControlName]="field.key"
      [placeholder]="field.placeholder || ''"
      [readonly]="isReadonly"
      [attr.disabled]="field.disabled ? true : null"
      (blur)="updateValue(control?.value)"
    />
    <button class="btn btn-outline-secondary" type="button" (click)="visible = !visible" [disabled]="isReadonly">
      <i class="bi" [ngClass]="visible ? 'bi-eye-slash' : 'bi-eye'"></i>
    </button>
  </div>
  <small class="form-text text-muted" *ngIf="field.hint">{{ field.hint }}</small>
  <div class="invalid-feedback d-block" *ngIf="errorMessage">{{ errorMessage }}</div>
</div>
